# This pre-commit configuration is specifically designed for sanitizing
# generic template files in this repository. The majority of files are
# Markdown templates, so the hooks are focused on basic file hygiene
# and Markdown formatting.

# This configuration is NOT intended for use in production projects -
# it exists solely to maintain the consistency and quality of the template
# files in this repository.

ci:
  autofix_prs: true
  autoupdate_commit_msg: "[pre-commit.ci] bump ⬆ suggestions"
  autoupdate_schedule: quarterly
  skip: [lychee, gitlint] # lychee: no binary in CI; gitlint: commit-msg stage, not run in CI
  # submodules: true

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
        name: 📄 end-of-file-fixer
      - id: trailing-whitespace
        name: ✂️ trailing-whitespace
      - id: check-json
        name: 🔍 check-json
      - id: check-yaml
        name: 🔍 check-yaml
      - id: check-toml
        name: 🔍 check-toml
      - id: check-executables-have-shebangs
        name: ⚡ check-executables-have-shebangs
      - id: check-case-conflict
        name: 🔤 check-case-conflict
      - id: check-added-large-files
        name: 📦 check-added-large-files
        args: ["--maxkb=100", "--enforce-all"]
      - id: detect-private-key
        name: 🔐 detect-private-key
      - id: check-merge-conflict
        name: 🔀 check-merge-conflict
      - id: mixed-line-ending
        name: ↩️ mixed-line-ending
        args: ["--fix=lf"]
      - id: pretty-format-json
        name: ✨ pretty-format-json
        args: ["--autofix"]

  - repo: https://github.com/JoC0de/pre-commit-prettier
    rev: v3.8.1 # using tag; previously pinned SHA when tags were not persistent
    hooks:
      - id: prettier
        name: 🎨 prettier
        files: \.(html|yml|yaml|toml|js)$
        # https://prettier.io/docs/en/options.html#print-width
        args: ["--print-width=120"]

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v10.2.0
    hooks:
      - id: eslint
        name: 🛡️ eslint
        additional_dependencies:
          - eslint@9.21.0
          - globals@16.0.0
          - "@eslint/js@9.21.0"

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        name: 🦀 ruff
        args: ["--line-length=120", "--fix"]
      - id: ruff-format
        name: 🦀 ruff-format
        args: ["--line-length=120"]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        name: ✏️ codespell
        args: ["--write-changes"]

  - repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        name: 📝 mdformat (general)
        exclude: ^plugins/(?!.*README\.md$)
        args: ["--number", "--wrap=no"]
        additional_dependencies:
          - mdformat-gfm
          - mdformat-ruff
          - mdformat-frontmatter
          - mdformat-config
          - mdformat-beautysh
          - mdformat-admon
          - mdformat-web
  - repo: https://github.com/lycheeverse/lychee.git
    rev: lychee-v0.23.0
    hooks:
      - id: lychee
        name: 🔗 lychee
        args:
          - --offline
          - --no-progress
          #- --exclude=^https?://
        types_or: [markdown, toml]

  - repo: local
    hooks:
      - id: node-syntax-check
        name: 🟩 node --check (hooks)
        language: system
        entry: node --check
        files: ^\.claude/hooks/.*\.js$|^\.codex/hooks/.*\.js$
        types: [javascript]

      - id: trim-plugin-tables
        name: ✂️ trim plugin table padding
        language: system
        entry: python3
        args:
          - "-c"
          - |
            import re, sys

            fence = re.compile(r'^\s*(```|~~~)')
            table = re.compile(r'^(\s*(?:>\s*)?)\|(.*)\|\s*$')
            sep = re.compile(r':?-{3,}:?')

            def emit(prefix, raw, end):
                cells = [c.strip() for c in raw.split('|')]
                rows = []; row = []
                for c in cells:
                    if c == '' and row:
                        rows.append(row); row = []
                    elif c != '':
                        row.append(c)
                if row: rows.append(row)
                lines = []
                for r in rows or [cells]:
                    if all(sep.fullmatch(c or '') for c in r):
                        r = [(':' if c.startswith(':') else '') + '---' + (':' if c.endswith(':') else '') for c in r]
                    lines.append(f"{prefix}| {' | '.join(r)} |{end}")
                if len(lines) > 1 and not end: lines[-1] = lines[-1].removesuffix('\n')
                return ''.join(lines)

            changed = False
            for f in sys.argv[1:]:
                old = open(f).read().splitlines(True); out = []; code = False
                for ln in old:
                    if fence.match(ln):
                        code = not code; out.append(ln); continue
                    end = '\n' if ln.endswith('\n') else ''; body = ln[:-1] if end else ln
                    m = None if code else table.match(body)
                    nl = emit(m.group(1), m.group(2), end) if m else ln
                    if nl != ln: changed = True
                    out.append(nl)
                open(f, 'w').write(''.join(out))
            sys.exit(1 if changed else 0)
        files: ^plugins/.*\.md$
        exclude: (?:^|/)README\.md$
        types: [markdown]

      - id: no-hardcoded-user-paths
        name: 🚫 No hardcoded user paths
        language: pygrep
        # Matches /Users/<realname>/ or /home/<realname>/ — alphanumeric usernames only.
        # Placeholder docs like /Users/<name>/ are not flagged (< is not alphanumeric).
        entry: /Users/[a-zA-Z0-9_-]+/|/home/[a-zA-Z0-9_-]+/
        files: ^\.claude/(agents|skills|rules)/.*\.md$|^\.claude/hooks/[^/]+\.js$|^\.claude/settings\.json$|^\.codex/(agents|skills|rules)/.*\.md$|^\.codex/hooks/[^/]+\.js$|^\.codex/settings\.json$

  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1 # run `pre-commit autoupdate --repo https://github.com/jorisroovers/gitlint` to set
    hooks:
      - id: gitlint
        name: ✅ gitlint
        stages: [commit-msg]
